CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

CONFIG_USB_HID_DEVICE_COUNT=2
CONFIG_ZMK_LAYER_STATUS_USB_HID=y
CONFIG_ZMK_LAYER_STATUS_BLE_HID=y

CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_SMP_ENFORCE_MITM=n
CONFIG_BT_SMP_SC_ONLY=n

CONFIG_ZMK_KEYBOARD_NAME="Crosses"
CONFIG_ZMK_EXT_POWER=y

CONFIG_PMW3610=y
# CONFIG_PMW3610_FORCE_AWAKE=y  # IRQ wakeup is sufficient; FORCE_AWAKE drains battery
CONFIG_PMW3610_CPI=1600
CONFIG_PMW3610_CPI_DIVIDOR=4
CONFIG_PMW3610_ORIENTATION_270=y
CONFIG_PMW3610_SNIPE_CPI=200
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=1
CONFIG_PMW3610_INVERT_X=y
CONFIG_PMW3610_POLLING_RATE_250=y

CONFIG_ZMK_INPUT_SPLIT=y

# BLE Mouse/Pointing support
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Faster BLE connection for better mouse performance
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# Raised from 0: latency=0 caused left-peripheral BLE disconnects under load
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=4
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=600

# Mouse HID tuning
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=30
CONFIG_ZMK_HID_SEPARATE_MOD_RELEASE_REPORT=y

# Split battery reporting (central fetches from peripheral)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

