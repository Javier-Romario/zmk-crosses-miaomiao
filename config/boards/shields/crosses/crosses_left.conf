CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

# Insomnia: while connected to right, ping every 10 s to reset the sleep timer so left
# never enters System Off during normal use. When the split link drops (stuck state or
# right goes out of range), pings stop and left sleeps after 25 s. Pressing any left key
# wakes it (kscan wakeup-source in crosses.dtsi), giving a clean BLE init and fresh
# advertising. Right (CONFIG_ZMK_SLEEP=n) is always scanning so reconnect is immediate.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=25000
CONFIG_ZMK_INSOMNIA_PING_INTERVAL=10000
CONFIG_ZMK_INSOMNIA_PING_ON_START=y

CONFIG_PMW3610=y
# CONFIG_PMW3610_FORCE_AWAKE=y  # Disabled: causes BLE stress on peripheral (scroll-only, IRQ wakeup is sufficient)
CONFIG_PMW3610_CPI=3200
CONFIG_PMW3610_CPI_DIVIDOR=8
CONFIG_PMW3610_ORIENTATION_270=y
CONFIG_PMW3610_SCROLL_TICK=150
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_PMW3610_INVERT_X=y
CONFIG_PMW3610_POLLING_RATE_125=y
CONFIG_ZMK_INPUT_SPLIT=y
